<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث Google</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 10px;
        }
        
        .header {
            background: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #4285f4;
            margin-bottom: 20px;
        }
        
        .search-box {
            background: white;
            border-radius: 8px;
            padding: 15px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            direction: rtl;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        
        button:active {
            background: #3367d6;
        }
        
        .soft-keys {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #e0e0e0;
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            font-size: 12px;
        }
        
        @media (max-width: 240px) {
            .header { font-size: 16px; padding: 10px; }
            input, button { padding: 8px; font-size: 12px; }
            .soft-keys { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">🔍 بحث Google</div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="اكتب ما تبحث عنه...">
        <button id="searchBtn">بحث</button>
    </div>
    
    <div class="soft-keys">
        <div>☰ خيارات</div>
        <div>↵ تأكيد</div>
        <div>↩ رجوع</div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        
        function performSearch() {
            const query = searchInput.value.trim();
            if (query) {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }
        
        searchBtn.addEventListener('click', performSearch);
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement !== searchInput) {
                performSearch();
            } else if (e.key === 'Escape') {
                alert("خيارات البحث: بحث متقدم | إعدادات");
            }
        });
        
        searchInput.focus();
    </script>
</body>
</html>
